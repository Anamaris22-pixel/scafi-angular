<div class="p-8">

    <div class="mb-8">
   
        <h1 class="text-5xl font-bold text-white">
            Seguridad
        </h1>

        <p class="text-gray-400 mt-2">
            Configuración de acceso y protección del sistema
        </p>

    </div>
<div class="mb-6">

    <button
        routerLink="/configuracion"
        class="flex items-center gap-2 bg-[#0E1A33] hover:bg-[#16264a] text-white px-5 py-3 rounded-xl border border-white/10 transition"
    >
        ← Configuración
    </button>

</div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Token -->

        <div
            class="bg-[#0E1A33] border border-white/5 rounded-2xl p-6"
        >

            <h2 class="text-2xl font-bold text-white mb-4">
                Token de Acceso
            </h2>

            <p class="text-gray-400 mb-4">
                Configuración de expiración y seguridad de los tokens de acceso.
            </p>

            <div class="space-y-4">

                <div>

                    <label class="block text-white/80 mb-2">
                        Expiración del Token (minutos)
                    </label>

                    <input
                        type="number"
                        [(ngModel)]="configuracion.expiracionToken"
                        class="bg-[#1A2A4B] border border-white/5 placeholder:text-gray-500 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="60"
                    />

                </div>
                <!-- POLÍTICA DE CONTRASEÑAS -->

<div class="bg-[#0E1A33] border border-white/5 rounded-2xl p-6">

    <h2 class="text-2xl font-bold text-white mb-4">
        Política de Contraseñas
    </h2>

    <div class="space-y-3 text-gray-300">

        <div class="flex justify-between">
            <span>Longitud mínima</span>
            <span class="text-green-400">5 caracteres</span>
        </div>

        <div class="flex justify-between">
            <span>Debe contener números</span>
            <span class="text-green-400">Sí</span>
        </div>

        

    </div>

</div>

<!-- SESIONES -->

<div class="bg-[#0E1A33] border border-white/5 rounded-2xl p-6">

    <h2 class="text-2xl font-bold text-white mb-4">
        Sesiones
    </h2>

    <div class="space-y-4">

        <div class="flex justify-between">
            <span class="text-gray-300">
                Último acceso
            </span>

            <span class="text-green-400">
                Hoy 10:35 AM
            </span>
        </div>

        <div class="flex justify-between">
            <span class="text-gray-300">
                Intentos fallidos
            </span>

            <span class="text-red-400">
                0
            </span>
        </div>

        <button
            class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition"
        >
            Cerrar Sesiones Activas
        </button>

    </div>

</div>
            </div>

        </div>
