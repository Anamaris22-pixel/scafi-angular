<div class="text-white">

  <div class="grid grid-cols-2 gap-6">

    <!-- FORM -->
    <div class="bg-white text-black p-6 rounded-3xl shadow-xl">

      <h2 class="text-3xl font-bold text-green-700 mb-6">

        🗺️ Registrar Lote

      </h2>

      <input
        type="text"
        [(ngModel)]="nombreLote"
        placeholder="Nombre del lote"
        class="w-full mb-4 p-4 border rounded-xl"
      />

      <input
        type="text"
        [(ngModel)]="ubicacion"
        placeholder="Ubicación"
        class="w-full mb-4 p-4 border rounded-xl"
      />

      <input
        type="number"
        [(ngModel)]="hectareas"
        placeholder="Hectáreas"
        class="w-full mb-4 p-4 border rounded-xl"
      />

      <select
        [(ngModel)]="estado"
        class="w-full mb-6 p-4 border rounded-xl"
      >

        <option value="">
          Seleccione estado
        </option>

        <option value="Activo">
          Activo
        </option>

        <option value="Inactivo">
          Inactivo
        </option>

      </select>

      <button
        (click)="guardar()"
        class="w-full bg-green-700 hover:bg-green-800 text-white p-4 rounded-xl text-lg font-bold"
      >

        Guardar Lote

      </button>

    </div>

    <!-- TABLA -->
    <div class="bg-white text-black p-6 rounded-3xl shadow-xl">

      <h2 class="text-3xl font-bold mb-6">

        📋 Inventario de Lotes

      </h2>

      <!-- BUSCAR -->
      <input
        type="text"
        [(ngModel)]="buscar"
        placeholder="Buscar lote..."
        class="w-full mb-5 p-4 border rounded-xl"
      />

      <div class="overflow-auto max-h-[650px]">

        <table class="w-full text-sm">

          <thead class="bg-slate-800 text-white sticky top-0">

            <tr>

              <th class="p-3">ID</th>

              <th class="p-3">Lote</th>

              <th class="p-3">Ubicación</th>

              <th class="p-3">Hectáreas</th>

              <th class="p-3">Estado</th>

            </tr>

          </thead>

          <tbody>

            <tr
              *ngFor="let l of lotesFiltrados()"
              class="border-b hover:bg-gray-100"
            >

              <td class="p-3 text-center">

                {{ l.idLote }}

              </td>

              <td class="p-3 text-center">

                {{ l.nombreLote }}

              </td>

              <td class="p-3 text-center">

                {{ l.ubicacion }}

              </td>

              <td class="p-3 text-center">

                {{ l.hectareas }}

              </td>

              <td class="p-3 text-center">

                {{ l.estado }}

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>
