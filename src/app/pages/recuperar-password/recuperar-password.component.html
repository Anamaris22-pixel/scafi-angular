<div class="w-full min-h-screen bg-gray-200 flex justify-center items-center">

  <div class="bg-white p-10 rounded-3xl shadow-xl w-[500px]">

    <h1 class="text-5xl font-bold text-center mb-10">
      Recuperar Contraseña
    </h1>

    <!-- CORREO -->

    <input
      type="email"
      [(ngModel)]="correo"
      placeholder="Ingrese su correo"
      class="w-full border-2 border-gray-300 rounded-2xl p-5 text-2xl mb-5 outline-none"
    >

    <!-- BOTON BUSCAR -->

    <button
      (click)="buscarUsuario()"
      [disabled]="cargandoBusqueda"
      class="w-full bg-blue-700 hover:bg-blue-800 text-white text-2xl font-bold p-5 rounded-2xl mb-5"
    >

      {{ cargandoBusqueda ? 'Buscando...' : 'Buscar Usuario' }}

    </button>

    <!-- SI EXISTE EL USUARIO -->

    <div *ngIf="usuarioEncontrado">

      <div class="bg-green-100 text-green-800 p-4 rounded-xl mb-5 text-xl">
        Usuario encontrado:
        <b>{{ usuario?.nombre }}</b>
      </div>

      <!-- NUEVA PASSWORD -->

      <input
        type="password"
        [(ngModel)]="nuevaPassword"
        placeholder="Nueva contraseña"
        class="w-full border-2 border-gray-300 rounded-2xl p-5 text-2xl mb-5 outline-none"
      >

      <!-- ENVIAR TOKEN -->

      <button
        (click)="enviarToken()"
        [disabled]="cargandoToken"
        class="w-full bg-yellow-500 hover:bg-yellow-600 text-white text-2xl font-bold p-5 rounded-2xl mb-5"
      >

        {{ cargandoToken ? 'Enviando...' : 'Enviar Token al Correo' }}

      </button>

      <!-- CAMBIAR PASSWORD -->

      <button
  *ngIf="tokenValido"
  (click)="guardarPassword()"
  [disabled]="cargando"
  class="w-full bg-green-600 hover:bg-green-700 text-white text-2xl font-bold p-5 rounded-2xl"
>

  {{ cargando ? 'Guardando...' : 'Cambiar Contraseña' }}

</button>

    </div>

    <!-- ERROR -->

    <div
      *ngIf="error"
      class="bg-red-100 text-red-700 p-4 rounded-xl mt-5 text-xl"
    >
      {{ error }}
    </div>

    <!-- MENSAJE -->

    <div
      *ngIf="mensaje"
      class="bg-green-100 text-green-700 p-4 rounded-xl mt-5 text-xl"
    >
      {{ mensaje }}
    </div>

  </div>

</div>
