<div class="p-6 max-w-5xl mx-auto">

  <h2 class="text-2xl font-bold mb-4">👤 Gestión de Usuarios</h2>

  <!-- FORM -->
  <div class="bg-white p-4 rounded shadow">

    <input [(ngModel)]="nuevo.nombre" placeholder="Nombre"
      class="w-full border p-2 mb-2 rounded">

    <input [(ngModel)]="nuevo.email" placeholder="Email"
      class="w-full border p-2 mb-2 rounded">

    <input type="password" [(ngModel)]="nuevo.password" placeholder="Contraseña"
      class="w-full border p-2 mb-2 rounded">

    <select [(ngModel)]="nuevo.rol"
      class="w-full border p-2 mb-2 rounded">
      <option *ngFor="let r of roles">{{ r }}</option>
    </select>

    <button (click)="guardar()"
      class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
      {{ editando ? 'Actualizar' : 'Crear Usuario' }}
    </button>

  </div>

  <!-- TABLA -->
  <div class="mt-6 bg-white p-4 rounded shadow">

    <table class="w-full text-left">
      <thead>
        <tr class="border-b">
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let u of usuarios" class="border-b">
          <td>{{ u.nombre }}</td>
          <td>{{ u.email }}</td>
          <td>
            <span class="px-2 py-1 rounded bg-gray-200">
              {{ u.rol }}
            </span>
          </td>

          <td class="flex gap-2">
            <button (click)="editar(u)"
              class="bg-blue-500 text-white px-2 py-1 rounded">
              Editar
            </button>

            <button (click)="eliminar(u.id)"
              class="bg-red-500 text-white px-2 py-1 rounded">
              Eliminar
            </button>
          </td>
        </tr>
      </tbody>

    </table>

  </div>

</div>
